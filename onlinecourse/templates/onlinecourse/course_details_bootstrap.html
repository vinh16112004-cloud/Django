<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <title>{{ course.name }}</title>
</head>
<body>
<div class="container mt-5">
    <div class="jumbotron">
        <h1 class="display-4">{{ course.name }}</h1>
        <p class="lead">{{ course.description }}</p>
    </div>

    <div class="row">
        {% for lesson in course.lesson_set.all %}
        <div class="col-md-6 mb-4">
            <div class="card h-100 shadow-sm">
                <div class="card-body">
                    <h5 class="card-title">Lesson {{ forloop.counter }}: {{ lesson.title }}</h5>
                    <p class="card-text">{{ lesson.content }}</p>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>

    <div class="text-center mt-4">
        <a href="{% url 'onlinecourse:submit' course.id %}" class="btn btn-primary btn-lg">Take the Exam</a>
    </div>
</div>
</body>
</html>
